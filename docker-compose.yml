version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: salon_os
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d salon_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@db:5432/salon_os?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_jwt_key
      - JWT_EXPIRES_IN=24h
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # The container will run 'npx prisma generate' and then 'npm start'

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
