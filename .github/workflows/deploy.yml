name: SalonOS CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: |
        cd server && npm install
        cd ../client && npm install

    - name: Generate Prisma Client
      run: cd server && npx prisma generate

    - name: Build Frontend
      run: cd client && npm run build

    # In a real environment, uncomment to run Jest/Supertest
    # - name: Run Backend Tests
    #   run: cd server && npm test

  deploy:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Simulated Docker Registry Login (Replace with actual secrets in production)
    # - name: Login to Docker Hub
    #   uses: docker/login-action@v3
    #   with:
    #     username: ${{ secrets.DOCKER_USERNAME }}
    #     password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Server Image
      run: docker build -t salonos-server:latest ./server

    - name: Build Client Image
      run: docker build -t salonos-client:latest ./client

    # Simulated Push (Replace with actual push command in production)
    # - name: Push Images
    #   run: |
    #     docker push salonos-server:latest
    #     docker push salonos-client:latest

    - name: Trigger Remote Deployment
      run: echo "Successfully built Docker images. Ready for remote pull."
